<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">LawnBot AI V3 effect image</title>
  <desc id="desc">V3 concept dashboard showing ROS simulation, multi-sensor fusion, edge deployment, real robot logs, and fleet closed-loop learning.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.48" stop-color="#f0f7ff"/>
      <stop offset="1" stop-color="#f2fbf7"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="simFloor" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#cde8d1"/>
      <stop offset="0.5" stop-color="#8fc79b"/>
      <stop offset="1" stop-color="#617f69"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b2430"/>
      <stop offset="1" stop-color="#344054"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#101828" flood-opacity="0.16"/>
    </filter>
    <pattern id="mesh" width="38" height="38" patternUnits="userSpaceOnUse">
      <path d="M 38 0 L 0 0 0 38" fill="none" stroke="#ffffff" stroke-width="1.4" opacity="0.25"/>
    </pattern>
    <style>
      .h1{font:800 38px Inter,Arial,sans-serif;fill:#1b2430}
      .h2{font:800 22px Inter,Arial,sans-serif;fill:#1b2430}
      .h3{font:750 16px Inter,Arial,sans-serif;fill:#1b2430}
      .body{font:500 15px Inter,Arial,sans-serif;fill:#475467}
      .small{font:650 12px Inter,Arial,sans-serif;fill:#667085}
      .tiny{font:700 10px Inter,Arial,sans-serif;fill:#667085}
      .metric{font:800 29px Inter,Arial,sans-serif;fill:#1b2430}
      .card{fill:url(#panel);stroke:#d8dee4;stroke-width:1;filter:url(#shadow)}
      .chipText{font:700 12px Inter,Arial,sans-serif}
      .wire{fill:none;stroke:#2c6fbb;stroke-width:2.4;stroke-linecap:round}
      .wireGreen{fill:none;stroke:#2f7d4f;stroke-width:2.4;stroke-linecap:round}
      .wireAmber{fill:none;stroke:#b7791f;stroke-width:2.4;stroke-linecap:round}
    </style>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect x="52" y="48" width="1496" height="904" rx="28" fill="#ffffff" stroke="#d8dee4" filter="url(#shadow)"/>

  <g transform="translate(92 90)">
    <rect x="0" y="0" width="52" height="52" rx="14" fill="#2c6fbb"/>
    <path d="M14 34h24l7-12H21z" fill="#eaf4ff"/>
    <path d="M22 17h20" stroke="#eaf4ff" stroke-width="4" stroke-linecap="round"/>
    <text x="72" y="25" class="h1">V3 LawnBot Robotics Platform</text>
    <text x="72" y="50" class="body">ROS/Gazebo or Isaac Sim, multi-sensor fusion, edge deployment, real logs, and fleet-level learning loops.</text>
    <g transform="translate(1082 4)">
      <rect x="0" y="0" width="116" height="32" rx="16" fill="#eff8ff" stroke="#b5d2f2"/>
      <text x="58" y="21" text-anchor="middle" class="chipText" fill="#2c6fbb">V3 TRACK</text>
      <rect x="130" y="0" width="183" height="32" rx="16" fill="#fff1f0" stroke="#f7b7ad"/>
      <text x="221" y="21" text-anchor="middle" class="chipText" fill="#b42318">4-6+ MONTHS</text>
    </g>
  </g>

  <g transform="translate(92 175)">
    <rect class="card" x="0" y="0" width="650" height="584" rx="22"/>
    <text x="28" y="42" class="h2">Industrial 3D Simulation</text>
    <text x="28" y="66" class="body">Physics, terrain, sensors, coordinate frames, and robot control loop.</text>

    <g transform="translate(44 112)">
      <polygon points="280,0 558,136 278,318 0,136" fill="url(#simFloor)" stroke="#617f69" stroke-width="2"/>
      <polygon points="280,0 558,136 278,318 0,136" fill="url(#mesh)"/>
      <polygon points="100,138 184,96 256,130 174,176" fill="#a7c2ab" stroke="#ffffff" stroke-width="4"/>
      <polygon points="392,118 470,154 410,198 330,158" fill="#7c5f45" stroke="#ffffff" stroke-width="4"/>
      <polygon points="196,226 268,188 338,220 262,266" fill="#6b7280" stroke="#ffffff" stroke-width="4"/>

      <g transform="translate(294 154)">
        <polygon points="0,-38 78,0 0,38 -78,0" fill="url(#edge)" stroke="#ffffff" stroke-width="6"/>
        <polygon points="-28,-10 0,-24 28,-10 0,6" fill="#60a5fa"/>
        <rect x="-22" y="-42" width="44" height="20" rx="9" fill="#111827" stroke="#ffffff" stroke-width="3"/>
        <circle cx="-56" cy="24" r="9" fill="#111827" stroke="#ffffff" stroke-width="3"/>
        <circle cx="56" cy="24" r="9" fill="#111827" stroke="#ffffff" stroke-width="3"/>
      </g>

      <g opacity="0.75">
        <path d="M294 154 L150 72" class="wire"/>
        <path d="M294 154 L462 80" class="wire"/>
        <path d="M294 154 L508 190" class="wire"/>
        <path d="M294 154 L150 246" class="wire"/>
        <path d="M294 154 L294 42" class="wire"/>
        <circle cx="150" cy="72" r="8" fill="#2c6fbb"/>
        <circle cx="462" cy="80" r="8" fill="#2c6fbb"/>
        <circle cx="508" cy="190" r="8" fill="#2c6fbb"/>
        <circle cx="150" cy="246" r="8" fill="#2c6fbb"/>
      </g>

      <g transform="translate(20 356)">
        <rect x="0" y="0" width="548" height="58" rx="16" fill="#ffffff" stroke="#d8dee4"/>
        <text x="18" y="24" class="small">Simulation stack</text>
        <text x="18" y="45" class="tiny">ROS 2 graph | Gazebo / Isaac Sim | LiDAR rays | IMU/GNSS | wheel odometry | collision physics</text>
      </g>
    </g>
  </g>

  <g transform="translate(772 175)">
    <rect class="card" x="0" y="0" width="728" height="276" rx="22"/>
    <text x="28" y="42" class="h2">Multi-sensor Fusion And Edge Runtime</text>
    <text x="28" y="66" class="body">Realistic robot stack where perception, localization, planning, and safety constraints run together.</text>

    <g transform="translate(34 104)">
      <rect x="0" y="0" width="138" height="64" rx="14" fill="#eff8ff" stroke="#b5d2f2"/>
      <text x="69" y="29" text-anchor="middle" class="h3">Camera</text>
      <text x="69" y="48" text-anchor="middle" class="tiny">RGB / segmentation</text>

      <rect x="172" y="0" width="138" height="64" rx="14" fill="#f4f0ff" stroke="#d8c8fb"/>
      <text x="241" y="29" text-anchor="middle" class="h3">LiDAR</text>
      <text x="241" y="48" text-anchor="middle" class="tiny">obstacle range</text>

      <rect x="344" y="0" width="138" height="64" rx="14" fill="#ecfdf3" stroke="#a6d9bd"/>
      <text x="413" y="29" text-anchor="middle" class="h3">RTK/GNSS</text>
      <text x="413" y="48" text-anchor="middle" class="tiny">global pose</text>

      <rect x="516" y="0" width="138" height="64" rx="14" fill="#fffaeb" stroke="#f3d19b"/>
      <text x="585" y="29" text-anchor="middle" class="h3">IMU</text>
      <text x="585" y="48" text-anchor="middle" class="tiny">slope / motion</text>

      <path d="M69 78 L326 122" class="wire"/>
      <path d="M241 78 L326 122" class="wire"/>
      <path d="M413 78 L326 122" class="wireGreen"/>
      <path d="M585 78 L326 122" class="wireAmber"/>

      <rect x="204" y="118" width="244" height="70" rx="18" fill="#111827"/>
      <text x="326" y="149" text-anchor="middle" class="h3" fill="#ffffff">Fusion + Safety Layer</text>
      <text x="326" y="171" text-anchor="middle" class="tiny" fill="#cbd5e1">state estimation, constraints, fallback rules</text>
    </g>
  </g>

  <g transform="translate(772 481)">
    <rect class="card" x="0" y="0" width="352" height="278" rx="22"/>
    <text x="26" y="40" class="h2">Real Robot Logs</text>
    <g transform="translate(26 68)">
      <rect x="0" y="0" width="300" height="38" rx="10" fill="#f8fafc" stroke="#d8dee4"/>
      <text x="14" y="24" class="small">run_2026_06_09_slope_wet</text>
      <rect x="0" y="52" width="300" height="38" rx="10" fill="#f8fafc" stroke="#d8dee4"/>
      <text x="14" y="76" class="small">run_2026_06_10_glare_boundary</text>
      <rect x="0" y="104" width="300" height="38" rx="10" fill="#fff1f0" stroke="#f7b7ad"/>
      <text x="14" y="128" class="small" fill="#b42318">run_2026_06_11_pet_near_miss</text>
      <rect x="0" y="156" width="300" height="38" rx="10" fill="#f8fafc" stroke="#d8dee4"/>
      <text x="14" y="180" class="small">run_2026_06_12_narrow_passage</text>
    </g>
  </g>

  <g transform="translate(1148 481)">
    <rect class="card" x="0" y="0" width="352" height="278" rx="22"/>
    <text x="26" y="40" class="h2">Edge Deployment</text>
    <g transform="translate(26 70)">
      <rect x="0" y="0" width="300" height="44" rx="12" fill="#111827"/>
      <text x="20" y="28" class="small" fill="#ffffff">TensorRT perception engine</text>
      <rect x="0" y="60" width="300" height="44" rx="12" fill="#111827"/>
      <text x="20" y="88" class="small" fill="#ffffff">Policy runtime + safety guard</text>
      <rect x="0" y="120" width="300" height="44" rx="12" fill="#111827"/>
      <text x="20" y="148" class="small" fill="#ffffff">Telemetry and log uploader</text>
      <text x="0" y="198" class="small">Latency target: 30ms perception</text>
      <text x="0" y="222" class="small">Fallback: stop, reverse, local replan</text>
    </g>
  </g>

  <g transform="translate(92 792)">
    <rect x="0" y="0" width="1408" height="112" rx="22" fill="#111827"/>
    <text x="28" y="39" class="h2" fill="#ffffff">V3 Positioning</text>
    <text x="28" y="69" class="body" fill="#cbd5e1">An industrial prototype direction: realistic robotics simulation, sensor fusion, edge deployment, real-world logs, and fleet-level closed-loop learning.</text>
    <text x="28" y="93" class="small" fill="#94a3b8">High value but high risk: best kept as a later track after the V2 portfolio system is stable.</text>
  </g>
</svg>
